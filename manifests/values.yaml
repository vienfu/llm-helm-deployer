image:
  repository: vllm-openai
  tag: v0.20.0-cu130-ubuntu2404
  pullPolicy: IfNotPresent
imagePullSecrets: []

# 离线 / 私有 registry 场景的全局开关：
# - global.imageRegistry: 非空时会作为前缀拼到所有镜像 repository 之前。
#     * 主 chart：vLLM 主镜像、helm test curl 镜像
#     * prometheus：upstream 不支持 global，需在 prometheus.server.image.repository 单独覆盖
#     * nvidia-device-plugin / dcgm-exporter：upstream 不支持 global，需在
#       各自段下单独 set image.repository（下方注释里有示例）
# - global.imagePullSecrets: 与主 chart 顶层 imagePullSecrets 合并使用。
global:
  imageRegistry: ""
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

model:
  name: /models/Qwen2.5-7B-Instruct
  servedName: ""
  hostPath:
    path: /data/models
    type: Directory
    mountPath: /models

vllm:
  tensorParallelSize: 1
  gpuMemoryUtilization: 0.9
  maxModelLen: ""
  maxNumSeqs: ""
  dtype: auto
  trustRemoteCode: false
  port: 8000
  extraArgs: []

auth:
  apiKey: ""

service:
  type: ClusterIP
  port: 8000
  annotations: 
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: llm.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    # nvidia.com/gpu: 1   # 模板会自动用 vllm.tensorParallelSize 覆盖
    volcano.sh/vgpu-number: "1"
    cpu: "20"
    memory: "100Gi"
  requests: {}
nodeSelector: {}
tolerations: []
affinity: {}
# Pod 调度器名称；留空则使用 Kubernetes 默认调度器（default-scheduler）。
# 自定义 GPU/拓扑感知调度器（如 volcano、kai-scheduler、koordinator）时填写其名称。
schedulerName: "volcano"

probes:
  startup:
    enabled: true
    failureThreshold: 60
    periodSeconds: 10
    httpGet:
      path: /health
      port: 8000
  readiness:
    enabled: true
    periodSeconds: 10
    httpGet:
      path: /health
      port: 8000
  liveness:
    enabled: true
    periodSeconds: 30
    httpGet:
      path: /health
      port: 8000

metrics:
  serviceMonitor:
    # 字段名沿用旧称（语义：是否被监控栈抓取），保持向后兼容。
    # 启用后会在 vLLM Pod 注入 prometheus.io/scrape=true 等 annotation，
    # 由 prometheus 子 chart（或外部 Prometheus）通过 kubernetes_sd 自动发现。
    enabled: true
    # 以下字段仅在外部 ServiceMonitor 场景下有意义，本 chart 已不再渲染 ServiceMonitor。
    interval: 15s
    labels: {}
    relabelings: []
  grafanaDashboard:
    # 是否渲染 vLLM dashboard ConfigMap（label=grafana_dashboard=1，被 Grafana sidecar 自动加载）。
    # 注意：当 grafana.enabled=true 时，此项会被联动认为 true（无需手动开启）。
    enabled: false

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
terminationGracePeriodSeconds: 60

shm:
  sizeLimit: 8Gi

serviceAccount:
  create: true
  name: ""
  annotations: {}

# 可选子 chart：默认全部关闭（enabled=false 时下面的字段完全不生效）。
# 字段会原样下发给对应子 chart，可作为可发现性入口。
# 完整字段见各 upstream values.yaml：
#   nvidia-device-plugin: https://github.com/NVIDIA/k8s-device-plugin/blob/main/deployments/helm/nvidia-device-plugin/values.yaml
#   dcgm-exporter:        https://github.com/NVIDIA/dcgm-exporter/blob/main/deployment/values.yaml
#   kube-prometheus-stack: https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml

nvidia-device-plugin:
  enabled: false
  # 镜像（如需走私有 registry，取消注释并改写；留空字符串会覆盖 upstream 默认，慎用）
  # 此 chart 不支持 global.imageRegistry，离线场景必须显式覆盖：
  # image:
  #   repository: my-reg.io/nvidia/k8s-device-plugin   # = global.imageRegistry + 原 nvcr.io 路径片段
  #   tag: ""                                           # 留空跟随子 chart AppVersion
  #   pullPolicy: IfNotPresent
  # 私有 registry 凭证；与主 chart 顶层 imagePullSecrets 无关，需单独配置
  imagePullSecrets: []
  # 调度到带 GPU 的节点（NFD 标签）；若集群未装 NFD，请清空 nodeSelector
  nodeSelector: {}
  #nodeSelector:
  #  feature.node.kubernetes.io/pci-10de.present: "true"
  tolerations: []
  #tolerations:
  #  - key: nvidia.com/gpu
  #    operator: Exists
  #    effect: NoSchedule

dcgm-exporter:
  enabled: true
  fullnameOverride: "dcgm-exporter"
  # 镜像（如需私有 registry 取消注释，本 chart 也不支持 global.imageRegistry）
  image:
    repository: dcgm-exporter   # = global.imageRegistry + 原 nvcr.io 路径片段
    tag: "3.3.5-3.4.0-ubuntu22.04"                                    # 留空跟随子 chart AppVersion
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  # 调度到 GPU 节点；非 GPU 节点上 dcgm-exporter 会启动失败
  nodeSelector: {}
  #nodeSelector:
  #  feature.node.kubernetes.io/pci-10de.present: "true"
  tolerations: []
  #tolerations:
  #  - key: nvidia.com/gpu
  #    operator: Exists
  #    effect: NoSchedule
  serviceMonitor:
    enabled: true
  service:
    type: ClusterIP
    annotations: 
      prometheus.io/scrape: "true"
      prometheus.io/port: "9400"
      prometheus.io/path: "/metrics"

prometheus:
  enabled: true
  # 单实例 Prometheus（prometheus-community/prometheus 29.8.0，appVersion v3.11.3）。
  # 已关闭 alertmanager / pushgateway / node-exporter / kube-state-metrics，
  # 只保留 prometheus-server，配合 annotation-based scrape 抓取 vLLM Pod。
  alertmanager:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  prometheus-node-exporter:
    enabled: false
  kube-state-metrics:
    enabled: false
  configmapReload:
    prometheus:
      image:
        repository: prometheus-config-reloader
        tag: v0.91.0
  server:
    fullnameOverride: "prometheus-server"
    image:
      repository: prometheus
      tag: v3.11.3
    persistentVolume:
      # 默认使用 emptyDir（Pod 重启数据丢失）；生产场景建议设为 true。
      enabled: false
      size: 20Gi
      storageClass: ""
    retention: "7d"
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    # 抓取 vLLM Pod：依赖 Pod 上的 prometheus.io/scrape=true 等 annotation
    # （主 chart deployment.yaml 在 metrics.serviceMonitor.enabled=true 时自动注入）。
    # 注意：此字段被用户覆盖时会整体替换默认配置，请复制后追加而不是直接替换。
    extraScrapeConfigs: |
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

# 可选 Grafana 子 chart（grafana/grafana 10.5.15，appVersion 12.3.1）。默认关闭。
# 设计参考：docs/superpowers/specs/2026-05-27-grafana-optional.md
# - 默认开启 dashboard sidecar（kiwigrid/k8s-sidecar）：自动发现 label=grafana_dashboard=1 的 ConfigMap。
# - 默认 Prometheus datasource 指向本 chart 部署的 prometheus-server Service，无需用户手填。
# - 上游不识别 global.imageRegistry，离线场景需在 image.repository / sidecar.image.repository 单独覆盖。
# - admin 默认密码：未显式设置 adminPassword 时由子 chart 自动生成，可通过下面命令取出：
#     kubectl -n <ns> get secret <release>-grafana -o jsonpath='{.data.admin-password}' | base64 -d
# - 已开启 KPS 或自带 Grafana 的客户：保持 enabled=false 即可，仅由 metrics.grafanaDashboard 投递 dashboard。
grafana:
  enabled: false

  # 固定 Deployment / Service 名为 "grafana"，避免带 release 前缀
  fullnameOverride: grafana

  # ---- 镜像（离线/私有仓覆盖示例，取消注释并改成你的私有仓）----
  image:
    registry: ""
    repository: grafana
    # tag: ""                         # 留空跟随 chart appVersion (12.3.1)
    pullPolicy: IfNotPresent
    # registry: my-reg.io
    # repository: llm/grafana

  # ---- 管理员凭据：优先使用外部已存 Secret ----
  admin:
    existingSecret: ""               # 非空：使用该 Secret 中的 admin-user / admin-password 字段
    userKey: admin-user
    passwordKey: admin-password
  # 留空 existingSecret 时由子 chart 生成随机密码到 <release>-grafana Secret
  # adminUser: admin
  # adminPassword: ""                # 不建议直接写明文，优先 existingSecret

  # ---- 持久化：默认 emptyDir，生产建议 PVC ----
  persistence:
    enabled: false
    # size: 10Gi
    # storageClassName: ""

  # ---- 暴露：默认 ClusterIP，按需开 Ingress / NodePort ----
  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: false
    ingressClassName: ""
    hosts: []                        # 不给默认占位 host，避免误用
    tls: []

  # ---- 资源（轻量默认）----
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # ---- Dashboard sidecar：自动发现 ConfigMap 标签匹配的仪表盘 ----
  sidecar:
    image:
      registry: ""
      repository: k8s-sidecar
      tag: 2.5.0
      # registry: my-reg.io
      # repository: llm/k8s-sidecar
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      folder: /tmp/dashboards
      provider:
        allowUiUpdates: false
    datasources:
      enabled: false                 # 我们用 datasources 字段直接渲染，不走 sidecar 扫描

  # ---- 默认 Datasource：指向本 chart 的 prometheus-server Service ----
  # 注意：prometheus sub-chart 的 server.fullnameOverride=prometheus-server，
  # 因此最终 Service 名为 "prometheus-server"（不带 release 前缀），下方 url 已对齐。
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          isDefault: true
          url: http://prometheus-server.{{ .Release.Namespace }}.svc:80
          editable: false
