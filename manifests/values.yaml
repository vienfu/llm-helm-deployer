image:
  repository: vllm/vllm-openai
  tag: v0.6.3
  pullPolicy: IfNotPresent
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

model:
  name: /models/Qwen2.5-7B-Instruct
  servedName: ""
  hostPath:
    path: /data/models
    type: Directory
    mountPath: /models

vllm:
  tensorParallelSize: 1
  gpuMemoryUtilization: 0.9
  maxModelLen: ""
  dtype: auto
  trustRemoteCode: false
  port: 8000
  extraArgs: []

auth:
  apiKey: ""

service:
  type: ClusterIP
  port: 8000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: llm.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    nvidia.com/gpu: 1   # 模板会自动用 vllm.tensorParallelSize 覆盖
  requests: {}
nodeSelector: {}
tolerations: []
affinity: {}

probes:
  startup:
    enabled: true
    failureThreshold: 60
    periodSeconds: 10
    httpGet:
      path: /health
      port: 8000
  readiness:
    enabled: true
    periodSeconds: 10
    httpGet:
      path: /health
      port: 8000
  liveness:
    enabled: true
    periodSeconds: 30
    httpGet:
      path: /health
      port: 8000

metrics:
  serviceMonitor:
    enabled: true
    interval: 15s
    labels: {}
    relabelings: []
  grafanaDashboard:
    enabled: false

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
terminationGracePeriodSeconds: 60

shm:
  sizeLimit: 8Gi

serviceAccount:
  create: true
  name: ""
  annotations: {}

# 可选子 chart：默认全部关闭（enabled=false 时下面的字段完全不生效）。
# 字段会原样下发给对应子 chart，可作为可发现性入口。
# 完整字段见各 upstream values.yaml：
#   nvidia-device-plugin: https://github.com/NVIDIA/k8s-device-plugin/blob/main/deployments/helm/nvidia-device-plugin/values.yaml
#   dcgm-exporter:        https://github.com/NVIDIA/dcgm-exporter/blob/main/deployment/values.yaml
#   kube-prometheus-stack: https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml

nvidia-device-plugin:
  enabled: false
  # 镜像（如需走私有 registry，取消注释并改写；留空字符串会覆盖 upstream 默认，慎用）
  # image:
  #   repository: nvcr.io/nvidia/k8s-device-plugin   # upstream 默认
  #   tag: ""                                         # 留空跟随子 chart AppVersion
  #   pullPolicy: IfNotPresent
  # 私有 registry 凭证；与主 chart 顶层 imagePullSecrets 无关，需单独配置
  imagePullSecrets: []
  # 调度到带 GPU 的节点（NFD 标签）；若集群未装 NFD，请清空 nodeSelector
  nodeSelector:
    feature.node.kubernetes.io/pci-10de.present: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

dcgm-exporter:
  enabled: false
  # 镜像（如需私有 registry 取消注释）
  # image:
  #   repository: nvcr.io/nvidia/k8s/dcgm-exporter   # upstream 默认
  #   tag: ""                                         # 留空跟随子 chart AppVersion
  #   pullPolicy: IfNotPresent
  imagePullSecrets: []
  # 调度到 GPU 节点；非 GPU 节点上 dcgm-exporter 会启动失败
  nodeSelector:
    feature.node.kubernetes.io/pci-10de.present: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  serviceMonitor:
    enabled: true

kube-prometheus-stack:
  enabled: false
  # 此 chart 内置多个组件镜像，需到对应子段下覆盖。整体走私有 registry 的常用路径：
  #   prometheus.prometheusSpec.image.registry / repository / tag
  #   grafana.image.registry / repository / tag
  #   alertmanager.alertmanagerSpec.image.registry / repository / tag
  #   prometheusOperator.image.registry / repository / tag
  #   kube-state-metrics.image.registry / repository / tag
  #   prometheus-node-exporter.image.registry / repository / tag
  # global.imagePullSecrets 会下发给所有子组件
  global:
    imagePullSecrets: []
  # CRDs 必装：本 chart 输出的 ServiceMonitor 依赖之
  crds:
    enabled: true
  alertmanager:
    enabled: false
  grafana:
    enabled: true
    # 必须 --set kube-prometheus-stack.grafana.adminPassword=... 覆盖
    adminPassword: ""
  prometheus:
    prometheusSpec:
      retention: 15d
      # 让 Prometheus 抓取所有 ServiceMonitor，避免 release label 不匹配漏抓
      serviceMonitorSelectorNilUsesHelmValues: false
