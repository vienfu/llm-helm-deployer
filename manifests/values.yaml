image:
  repository: vllm/vllm-openai
  tag: v0.6.3
  pullPolicy: IfNotPresent
imagePullSecrets: []

# 离线 / 私有 registry 场景的全局开关：
# - global.imageRegistry: 非空时会作为前缀拼到所有镜像 repository 之前。
#     * 主 chart：vLLM 主镜像、helm test curl 镜像
#     * kube-prometheus-stack：upstream 原生支持，自动接管所有子组件
#     * nvidia-device-plugin / dcgm-exporter：upstream 不支持 global，需在
#       各自段下单独 set image.repository（下方注释里有示例）
# - global.imagePullSecrets: 与主 chart 顶层 imagePullSecrets 合并使用。
#     kube-prometheus-stack 通过 .Values.kube-prometheus-stack.global.imagePullSecrets
#     单独透传（已在下方预置）。
global:
  imageRegistry: ""
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

model:
  name: /models/Qwen2.5-7B-Instruct
  servedName: ""
  hostPath:
    path: /data/models
    type: Directory
    mountPath: /models

vllm:
  tensorParallelSize: 1
  gpuMemoryUtilization: 0.9
  maxModelLen: ""
  dtype: auto
  trustRemoteCode: false
  port: 8000
  extraArgs: []

auth:
  apiKey: ""

service:
  type: ClusterIP
  port: 8000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: llm.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    nvidia.com/gpu: 1   # 模板会自动用 vllm.tensorParallelSize 覆盖
  requests: {}
nodeSelector: {}
tolerations: []
affinity: {}
# Pod 调度器名称；留空则使用 Kubernetes 默认调度器（default-scheduler）。
# 自定义 GPU/拓扑感知调度器（如 volcano、kai-scheduler、koordinator）时填写其名称。
schedulerName: ""

probes:
  startup:
    enabled: true
    failureThreshold: 60
    periodSeconds: 10
    httpGet:
      path: /health
      port: 8000
  readiness:
    enabled: true
    periodSeconds: 10
    httpGet:
      path: /health
      port: 8000
  liveness:
    enabled: true
    periodSeconds: 30
    httpGet:
      path: /health
      port: 8000

metrics:
  serviceMonitor:
    enabled: true
    interval: 15s
    labels: {}
    relabelings: []
  grafanaDashboard:
    enabled: false

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
terminationGracePeriodSeconds: 60

shm:
  sizeLimit: 8Gi

serviceAccount:
  create: true
  name: ""
  annotations: {}

# 可选子 chart：默认全部关闭（enabled=false 时下面的字段完全不生效）。
# 字段会原样下发给对应子 chart，可作为可发现性入口。
# 完整字段见各 upstream values.yaml：
#   nvidia-device-plugin: https://github.com/NVIDIA/k8s-device-plugin/blob/main/deployments/helm/nvidia-device-plugin/values.yaml
#   dcgm-exporter:        https://github.com/NVIDIA/dcgm-exporter/blob/main/deployment/values.yaml
#   kube-prometheus-stack: https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml

nvidia-device-plugin:
  enabled: false
  # 镜像（如需走私有 registry，取消注释并改写；留空字符串会覆盖 upstream 默认，慎用）
  # 此 chart 不支持 global.imageRegistry，离线场景必须显式覆盖：
  # image:
  #   repository: my-reg.io/nvidia/k8s-device-plugin   # = global.imageRegistry + 原 nvcr.io 路径片段
  #   tag: ""                                           # 留空跟随子 chart AppVersion
  #   pullPolicy: IfNotPresent
  # 私有 registry 凭证；与主 chart 顶层 imagePullSecrets 无关，需单独配置
  imagePullSecrets: []
  # 调度到带 GPU 的节点（NFD 标签）；若集群未装 NFD，请清空 nodeSelector
  nodeSelector:
    feature.node.kubernetes.io/pci-10de.present: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

dcgm-exporter:
  enabled: false
  # 镜像（如需私有 registry 取消注释，本 chart 也不支持 global.imageRegistry）
  # image:
  #   repository: my-reg.io/nvidia/k8s/dcgm-exporter   # = global.imageRegistry + 原 nvcr.io 路径片段
  #   tag: ""                                           # 留空跟随子 chart AppVersion
  #   pullPolicy: IfNotPresent
  imagePullSecrets: []
  # 调度到 GPU 节点；非 GPU 节点上 dcgm-exporter 会启动失败
  nodeSelector:
    feature.node.kubernetes.io/pci-10de.present: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  serviceMonitor:
    enabled: true

kube-prometheus-stack:
  enabled: false
  # 镜像 registry：本 chart 原生支持 .Values.global.imageRegistry，
  # 主 chart 顶层 global 段会自动下发到此处（前提：本段下不要再显式写 global:），
  # 因此设主 chart 的 global.imageRegistry 即可一并接管 kps 内所有子组件镜像。
  #
  # 单独覆盖某组件镜像示例：
  #   prometheus.prometheusSpec.image.registry / repository / tag
  #   grafana.image.registry / repository / tag
  #   alertmanager.alertmanagerSpec.image.registry / repository / tag
  #   prometheusOperator.image.registry / repository / tag
  #   kube-state-metrics.image.registry / repository / tag
  #   prometheus-node-exporter.image.registry / repository / tag
  # CRDs 必装：本 chart 输出的 ServiceMonitor 依赖之
  crds:
    enabled: true
  alertmanager:
    enabled: false
  grafana:
    enabled: true
    # 必须 --set kube-prometheus-stack.grafana.adminPassword=... 覆盖
    adminPassword: ""
  prometheus:
    prometheusSpec:
      retention: 15d
      # 让 Prometheus 抓取所有 ServiceMonitor，避免 release label 不匹配漏抓
      serviceMonitorSelectorNilUsesHelmValues: false
