apiVersion: v2
name: llm-helm-deployer
description: One-click Helm chart to deploy a text LLM with vLLM (NVIDIA GPU, OpenAI-compatible API).
type: application
version: 0.1.0
appVersion: "v0.6.3"
keywords:
  - llm
  - vllm
  - openai
  - gpu
  - inference
home: https://github.com/vienfu/llm-helm-deployer
sources:
  - https://github.com/vienfu/llm-helm-deployer
maintainers:
  - name: vienfu
dependencies:
  - name: nvidia-device-plugin
    version: "0.17.0"
    repository: https://nvidia.github.io/k8s-device-plugin
    condition: nvidia-device-plugin.enabled
  - name: dcgm-exporter
    version: "3.4.2"
    repository: https://nvidia.github.io/dcgm-exporter/helm-charts
    condition: dcgm-exporter.enabled
  - name: prometheus
    version: "29.8.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
